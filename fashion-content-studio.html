<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Content Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1a2e;--ink2:#2d2d44;--rose:#c8586c;--rose-light:#f7e8eb;--rose-dark:#a8404f;--sand:#f5f0eb;--sand2:#ede7de;--gold:#c9a96e;--white:#ffffff;--muted:#8a8a9a;--border:#e2ddd8;--green:#4caf7d;--violet:#7c5cbf}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--sand2)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-rose{background:var(--rose-light);color:var(--rose-dark)}.badge-green{background:#e8f5ee;color:#2e7d52}.badge-violet{background:#ede8f7;color:var(--violet)}.badge-gold{background:#faf3e8;color:#8a6520}
input,textarea,select{font-family:'DM Sans',sans-serif}
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(26,26,46,.05)}
.btn{font-family:'DM Sans',sans-serif;font-weight:500;border:none;cursor:pointer;transition:all .18s;border-radius:10px}
.btn-primary{background:var(--rose);color:#fff;padding:10px 20px}.btn-primary:hover{background:var(--rose-dark)}.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-secondary{background:var(--sand2);color:var(--ink2);padding:10px 20px}.btn-secondary:hover{background:var(--border)}
.btn-ghost{background:transparent;color:var(--muted);padding:8px 12px}.btn-ghost:hover{background:var(--sand2)}
.inp{width:100%;border:1px solid var(--border);border-radius:10px;padding:9px 13px;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(200,88,108,.1)}
.lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px;display:block;letter-spacing:.02em}
.overlay{position:fixed;inset:0;background:rgba(26,26,46,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(26,26,46,.2)}
.modal-header{padding:24px 24px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-body{padding:24px}.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px}
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.fade-in{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.dropzone{border:2px dashed var(--border);border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s}.dropzone:hover{border-color:var(--rose);background:var(--rose-light)}
.trend-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.trend-card-header{background:linear-gradient(90deg,var(--ink) 0%,var(--ink2) 100%);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.img-slot{border:1.5px dashed var(--border);border-radius:12px;overflow:hidden;background:var(--sand);transition:border-color .2s}.img-slot:hover{border-color:var(--rose)}
.img-slot-add{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--muted);font-size:12px}
.status-bar{padding:10px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px}
.status-working{background:#fef9ec;color:#856404;border:1px solid #fde68a}
.status-error{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5}
.status-ok{background:#f0fdf4;color:#166534;border:1px solid #86efac}
</style>

var TREND_SCENARIOS = [{
  id: 'seasonal',
  label: '🗓 Seasonal Trend Roundup',
  hint: 'For: Fall 2026 Trends, Spring Outfits 2026, Winter Fashion Trends...',
  instruction: "READER'S PAIN: \"I want to know what's actually happening in fashion right now, without reading 5000 words of runway recap I don't care about.\"\n\nYour job: extract what matters from the noise and tell them in plain language.\n\nHow to write:\nEach trend gets as much space as it deserves \u2014 some need two paragraphs, some need four sentences. Follow the content.\nName where the trend came from (show, brand, cultural moment) and where it's going (mainstream, niche, peaking, emerging).\nDon't report \u2014 curate. Your job is to tell them which trends are actually worth their attention and why.\nVary the entry point per trend: some start with the runway moment, some start with the street, some start with what it replaces.\nNo \"Styling Tip:\" labels. If there's a wearability insight, it lives inside the copy.\nEnd with your honest read on what's worth buying versus what to wait out."
}, {
  id: 'ranked',
  label: '🏆 Ranked: Best Trends Right Now',
  hint: 'For: Top 10 Trends, Biggest Trends of 2026, Most Wearable Trends...',
  instruction: "READER'S PAIN: \"I don't have time to read about every trend. Just tell me what the most important ones are.\"\n\nYour job: give them a clear hierarchy. Take a position and defend it.\n\nHow to write:\nOpen by naming #1 immediately \u2014 no buildup, no preamble. The ranking is the point.\nEach trend earns its position: explain WHY it ranks where it ranks, not just what it is.\nBe opinionated. \"This is #1 because it's replacing three things at once.\" \"This is #7 because it's only for specific body types and wardrobes.\"\nDisagree with consensus occasionally \u2014 if you think a hyped trend is overrated, say it with reasoning.\nEnd with a genuine verdict: what you'd actually spend money on from this list."
}, {
  id: 'versus',
  label: '⚡ Trend vs Anti-Trend (Out vs In)',
  hint: "For: What's In and Out 2026, Fashion Do's and Don'ts, What to Stop Wearing...",
  instruction: "READER'S PAIN: \"My wardrobe feels dated but I don't know what specifically to change or update.\"\n\nYour job: give them a clear before/after map they can act on.\n\nHow to write:\nEach section is a swap, not just a trend. \"Stop doing X, start doing Y, here's exactly why the shift happened.\"\nThe \"Out\" section isn't about shame \u2014 it's about understanding why something stopped working culturally or aesthetically.\nThe \"In\" section shows how to get there practically, not aspirationally.\nSome swaps are dramatic, some are subtle \u2014 vary the scale to keep it interesting.\nEnd with the three swaps that give the most return for the least effort."
}, {
  id: 'runway-to-real',
  label: '👗 Runway to Real Life',
  hint: 'For: translating high fashion, wearable runway trends, how to wear designer trends...',
  instruction: "READER'S PAIN: \"I see these incredible runway looks but they feel completely disconnected from anything I could actually wear.\"\n\nYour job: be the translator. Close the gap between editorial fantasy and real wardrobe.\n\nHow to write:\nEach trend: show what the extreme runway version looks like (name it specifically) then show what the real-life version looks like with actual pieces and price points.\nBe honest about which trends genuinely don't translate \u2014 and say so. Credibility comes from editing, not cheerleading.\nThe copy should make the reader feel like they understand fashion better, not just that they've seen more looks.\nInclude at least one \"this is where it gets interesting\" moment per trend \u2014 the non-obvious translation.\nEnd with a clear verdict: which runway trends are actually worth attempting this season."
}];

var OUTFIT_SCENARIOS = [{
  id: 'gallery',
